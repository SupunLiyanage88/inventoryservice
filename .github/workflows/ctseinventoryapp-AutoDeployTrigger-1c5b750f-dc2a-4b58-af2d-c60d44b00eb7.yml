name: Trigger auto deployment for ctseinventoryapp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ctseinventoryapp-AutoDeployTrigger-1c5b750f-dc2a-4b58-af2d-c60d44b00eb7.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CTSEINVENTORYAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CTSEINVENTORYAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CTSEINVENTORYAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ctseauthcontainer.azurecr.io
          registryUsername: ${{ secrets.CTSEINVENTORYAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CTSEINVENTORYAPP_REGISTRY_PASSWORD }}
          containerAppName: ctseinventoryapp
          resourceGroup: CTSE_GROUP
          imageToBuild: ctseauthcontainer.azurecr.io/ctseinventoryapp:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


