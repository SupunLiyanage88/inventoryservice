name: Trigger auto deployment for inventoryapp

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/inventoryapp-AutoDeployTrigger-7ca99b8a-748c-4f0a-9512-1c941803593d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.INVENTORYAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.INVENTORYAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.INVENTORYAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: inventoryservice.azurecr.io
          registryUsername: ${{ secrets.INVENTORYAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.INVENTORYAPP_REGISTRY_PASSWORD }}
          containerAppName: inventoryapp
          resourceGroup: ctse
          imageToBuild: inventoryservice.azurecr.io/inventoryapp:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


